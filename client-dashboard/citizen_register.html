<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration | Swachh Bharat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: white; width: 100%; max-width: 450px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden; border-top: 5px solid #198754;
        }
        .header { text-align: center; padding: 30px 20px 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="header">
        <h4 class="fw-bold text-success">Create Account</h4>
        <p class="text-muted small">Enter details manually</p>
    </div>

    <div class="p-4">
        <form onsubmit="handleRegister(event)">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">FULL NAME</label>
                <input type="text" id="regName" class="form-control" placeholder="e.g. Rahul Sharma" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">MOBILE NUMBER</label>
                <input type="text" id="regMobile" class="form-control" placeholder="9876543210" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">PASSWORD</label>
                <input type="password" id="regPass" class="form-control" placeholder="Create Password" required>
            </div>
            
            <button class="btn btn-success w-100 py-2 mb-3">Sign Up</button>
        </form>

        <div class="text-center">
            <a href="citizen_login.html" class="text-decoration-none small text-muted">Already have an account? <strong>Log In</strong></a>
        </div>
    </div>
</div>

<script>
    async function handleRegister(e) {
        e.preventDefault();
        const payload = {
            fullName: document.getElementById('regName').value,
            mobile: document.getElementById('regMobile').value,
            password: document.getElementById('regPass').value,
            isVerified: false
        };

        try {
            const res = await fetch('http://localhost:3000/api/citizen/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if(data.success) {
                alert("✅ Account Created! Please Login.");
                window.location.href = 'citizen_login.html';
            } else {
                alert("Error: " + data.message);
            }
        } catch(err) { alert("Server Error"); }
    }
</script>
</body>
</html>
