<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Official | Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #f3f4f6; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .card { 
            width: 100%; 
            max-width: 450px; 
            border: none; 
            border-top: 5px solid #004aad; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
    </style>
</head>
<body>

<div class="card p-4">
    <div class="text-center mb-4">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" height="40" class="mb-2">
        <h5 class="fw-bold text-primary">Official Registration</h5>
        <p class="text-muted small">Smart City Waste Management System</p>
    </div>
    
    <form onsubmit="registerAdmin(event)">
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">USERNAME</label>
            <input type="text" id="username" class="form-control" placeholder="e.g. ward_officer_01" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">PASSWORD</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold text-muted">ASSIGN ROLE / DEPARTMENT</label>
            <select id="dept" class="form-select" required>
                <option value="" selected disabled>-- Select Role --</option>
                
                <option value="Commissioner" style="font-weight: bold; color: #004aad;">
                    🏛️ Municipal Commissioner (Chief Monitor)
                </option>
                
                <option value="Control Room">
                    📡 Command & Control Centre (CCC)
                </option>
                
                <option value="Sanitation">
                    🚛 Sanitation & Waste Management
                </option>
                
                <option value="Grievance">
                    📞 Public Grievance Redressal
                </option>

                <option value="IT Cell">
                    💻 IT & Smart City Cell
                </option>
            </select>
            <div class="form-text small text-primary" id="role-desc">
                * Commissioner has full access to Analytics & Routes.
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3 fw-bold">CREATE OFFICIAL ID</button>
    </form>

    <div class="text-center border-top pt-3">
        <a href="admin_login.html" class="small text-decoration-none text-muted">
            Back to Login
        </a>
    </div>
</div>

<script>
    // Just a little UI interaction
    document.getElementById('dept').addEventListener('change', function() {
        const desc = document.getElementById('role-desc');
        if(this.value === 'Commissioner') {
            desc.innerText = "⭐ Full Access: Analytics, Routes, & Staff Monitoring.";
        } else if (this.value === 'Sanitation') {
            desc.innerText = "🚛 Access: Route Maps & Bin Status only.";
        } else {
            desc.innerText = "* Role determines access level on Dashboard.";
        }
    });

    async function registerAdmin(e) {
        e.preventDefault();
        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            department: document.getElementById('dept').value
        };

        if(payload.department === "") {
            alert("Please select a valid department.");
            return;
        }

        try {
            const res = await fetch('http://localhost:3000/api/auth/register', {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if(data.success) {
                alert(`✅ Registration Successful!\n\nUser: ${payload.username}\nRole: ${payload.department}`);
                window.location.href = 'admin_login.html';
            } else {
                alert("Registration Failed: " + data.message);
            }
        } catch (e) { 
            alert("Server Error. Is Node.js running?"); 
        }
    }
</script>
</body>
</html>
